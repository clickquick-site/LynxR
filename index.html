/* ============================================================
   R.Lynx™ RestFast — Global Styles
   Aesthetic: Industrial Dark / Warm Amber
   ============================================================ */

@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&family=Nunito:wght@400;600;700;800&display=swap');

:root {
  /* Core Palette */
  --bg-void:        #0a0b0d;
  --bg-deep:        #0f1114;
  --bg-base:        #141618;
  --bg-surface:     #1c1e22;
  --bg-raised:      #242629;
  --bg-hover:       #2c2f34;
  --bg-card:        #1e2126;

  /* Amber Accent */
  --amber:          #f59e0b;
  --amber-bright:   #fbbf24;
  --amber-dim:      #d97706;
  --amber-glow:     rgba(245,158,11,0.15);
  --amber-glow-sm:  rgba(245,158,11,0.08);

  /* Status Colors */
  --green:          #22c55e;
  --green-dim:      #16a34a;
  --red:            #ef4444;
  --red-dim:        #dc2626;
  --blue:           #3b82f6;
  --cyan:           #06b6d4;

  /* Text */
  --text-primary:   #f1f3f5;
  --text-secondary: #9ca3af;
  --text-muted:     #6b7280;
  --text-faint:     #374151;

  /* Borders */
  --border:         rgba(255,255,255,0.06);
  --border-strong:  rgba(255,255,255,0.12);
  --border-amber:   rgba(245,158,11,0.3);

  /* Fonts */
  --font-display:   'Rajdhani', sans-serif;
  --font-mono:      'IBM Plex Mono', monospace;
  --font-body:      'Nunito', sans-serif;

  /* Sizing */
  --radius-sm:      6px;
  --radius:         10px;
  --radius-lg:      16px;
  --radius-xl:      24px;

  /* Shadows */
  --shadow-sm:      0 1px 3px rgba(0,0,0,0.4);
  --shadow:         0 4px 12px rgba(0,0,0,0.5);
  --shadow-lg:      0 8px 32px rgba(0,0,0,0.6);
  --shadow-amber:   0 4px 20px rgba(245,158,11,0.25);
}

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html {
  font-size: 16px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  font-family: var(--font-body);
  background: var(--bg-void);
  color: var(--text-primary);
  min-height: 100vh;
  overflow: hidden;
}

/* ——— Scrollbars ——— */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: var(--bg-deep); }
::-webkit-scrollbar-thumb { background: var(--bg-hover); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--amber-dim); }

/* ——— Base Button ——— */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 10px 20px;
  border: none;
  border-radius: var(--radius);
  font-family: var(--font-display);
  font-size: 1rem;
  font-weight: 600;
  letter-spacing: 0.5px;
  cursor: pointer;
  transition: all 0.18s ease;
  user-select: none;
  white-space: nowrap;
  position: relative;
  overflow: hidden;
}

.btn::after {
  content: '';
  position: absolute;
  inset: 0;
  background: rgba(255,255,255,0);
  transition: background 0.15s;
}
.btn:hover::after { background: rgba(255,255,255,0.05); }
.btn:active { transform: scale(0.97); }

.btn-primary {
  background: var(--amber);
  color: #0a0b0d;
  box-shadow: var(--shadow-amber);
}
.btn-primary:hover { background: var(--amber-bright); }

.btn-secondary {
  background: var(--bg-raised);
  color: var(--text-primary);
  border: 1px solid var(--border-strong);
}
.btn-secondary:hover { border-color: var(--border-amber); color: var(--amber); }

.btn-danger {
  background: var(--red-dim);
  color: #fff;
}
.btn-danger:hover { background: var(--red); }

.btn-success {
  background: var(--green-dim);
  color: #fff;
}
.btn-success:hover { background: var(--green); }

.btn-ghost {
  background: transparent;
  color: var(--text-secondary);
  border: 1px solid var(--border);
}
.btn-ghost:hover { color: var(--text-primary); border-color: var(--border-strong); }

.btn-lg { padding: 14px 28px; font-size: 1.1rem; }
.btn-sm { padding: 7px 14px; font-size: 0.875rem; }
.btn-icon { padding: 10px; min-width: 40px; min-height: 40px; border-radius: var(--radius-sm); }

/* ——— Input ——— */
.input {
  width: 100%;
  padding: 11px 16px;
  background: var(--bg-deep);
  border: 1px solid var(--border-strong);
  border-radius: var(--radius);
  color: var(--text-primary);
  font-family: var(--font-body);
  font-size: 0.95rem;
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.input:focus {
  border-color: var(--amber);
  box-shadow: 0 0 0 3px var(--amber-glow);
}
.input::placeholder { color: var(--text-muted); }

/* ——— Badge ——— */
.badge {
  display: inline-flex;
  align-items: center;
  padding: 3px 10px;
  border-radius: 100px;
  font-size: 0.75rem;
  font-weight: 700;
  font-family: var(--font-display);
  letter-spacing: 0.5px;
  text-transform: uppercase;
}
.badge-amber { background: var(--amber-glow); color: var(--amber); border: 1px solid var(--border-amber); }
.badge-green { background: rgba(34,197,94,0.1); color: var(--green); border: 1px solid rgba(34,197,94,0.3); }
.badge-red   { background: rgba(239,68,68,0.1);  color: var(--red);   border: 1px solid rgba(239,68,68,0.3); }
.badge-blue  { background: rgba(59,130,246,0.1); color: var(--blue);  border: 1px solid rgba(59,130,246,0.3); }

/* ——— Modal / Overlay ——— */
.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(4px);
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
  animation: fadeIn 0.2s ease;
}
.modal {
  background: var(--bg-card);
  border: 1px solid var(--border-strong);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg);
  padding: 28px;
  min-width: 360px;
  max-width: 90vw;
  max-height: 90vh;
  overflow-y: auto;
  animation: slideUp 0.25s ease;
}
.modal-title {
  font-family: var(--font-display);
  font-size: 1.4rem;
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.modal-title .icon { color: var(--amber); }

/* ——— Toast Notifications ——— */
#toast-container {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 999;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.toast {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 20px;
  background: var(--bg-raised);
  border: 1px solid var(--border-strong);
  border-radius: var(--radius);
  box-shadow: var(--shadow-lg);
  font-size: 0.9rem;
  font-weight: 600;
  animation: toastIn 0.3s ease;
  min-width: 260px;
}
.toast.success { border-left: 3px solid var(--green); }
.toast.error   { border-left: 3px solid var(--red); }
.toast.info    { border-left: 3px solid var(--amber); }
.toast.fadeout { animation: toastOut 0.3s ease forwards; }

/* ——— Divider ——— */
.divider {
  width: 100%;
  height: 1px;
  background: var(--border);
  margin: 16px 0;
}

/* ——— Animations ——— */
@keyframes fadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}
@keyframes slideUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes toastIn {
  from { opacity: 0; transform: translateX(24px); }
  to   { opacity: 1; transform: translateX(0); }
}
@keyframes toastOut {
  from { opacity: 1; transform: translateX(0); }
  to   { opacity: 0; transform: translateX(24px); }
}
@keyframes pulse-amber {
  0%, 100% { box-shadow: 0 0 0 0 rgba(245,158,11,0.4); }
  50%       { box-shadow: 0 0 0 8px rgba(245,158,11,0); }
}

/* ——— Utility classes ——— */
.hidden  { display: none !important; }
.flex    { display: flex; }
.flex-col{ display: flex; flex-direction: column; }
.items-center { align-items: center; }
.justify-between { justify-content: space-between; }
.gap-2 { gap: 8px; }
.gap-3 { gap: 12px; }
.gap-4 { gap: 16px; }
.w-full { width: 100%; }
.text-amber  { color: var(--amber); }
.text-green  { color: var(--green); }
.text-red    { color: var(--red); }
.text-muted  { color: var(--text-muted); }
.font-mono   { font-family: var(--font-mono); }
.font-display{ font-family: var(--font-display); }

/* ============================================================
   R.Lynx™ RestFast — Login Page Styles
   ============================================================ */

body.login-page {
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg-void);
  overflow: hidden;
}

/* Animated background */
.login-bg {
  position: fixed;
  inset: 0;
  z-index: 0;
  overflow: hidden;
}
.login-bg::before {
  content: '';
  position: absolute;
  top: -30%;
  left: -20%;
  width: 80vh;
  height: 80vh;
  background: radial-gradient(circle, rgba(245,158,11,0.07) 0%, transparent 70%);
  border-radius: 50%;
  animation: float1 8s ease-in-out infinite;
}
.login-bg::after {
  content: '';
  position: absolute;
  bottom: -20%;
  right: -10%;
  width: 60vh;
  height: 60vh;
  background: radial-gradient(circle, rgba(245,158,11,0.05) 0%, transparent 70%);
  border-radius: 50%;
  animation: float2 10s ease-in-out infinite;
}

.grid-overlay {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
  background-size: 40px 40px;
}

/* Login container */
.login-container {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 420px;
  padding: 24px;
  animation: loginAppear 0.6s ease;
}

.login-card {
  background: rgba(20,22,24,0.9);
  backdrop-filter: blur(20px);
  border: 1px solid var(--border-strong);
  border-radius: var(--radius-xl);
  padding: 40px 36px;
  box-shadow: var(--shadow-lg), 0 0 80px rgba(245,158,11,0.06);
}

/* Header */
.login-header {
  text-align: center;
  margin-bottom: 36px;
}
.login-logo {
  width: 72px;
  height: 72px;
  background: linear-gradient(135deg, var(--amber), var(--amber-dim));
  border-radius: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-display);
  font-size: 2rem;
  font-weight: 700;
  color: #0a0b0d;
  margin: 0 auto 20px;
  box-shadow: var(--shadow-amber);
}
.login-title {
  font-family: var(--font-display);
  font-size: 1.8rem;
  font-weight: 700;
  color: var(--text-primary);
  letter-spacing: 1px;
  margin-bottom: 4px;
}
.login-title span { color: var(--amber); }
.login-subtitle {
  font-size: 0.85rem;
  color: var(--text-muted);
  font-family: var(--font-display);
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

/* Role selector */
.role-selector {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 28px;
}
.role-btn {
  padding: 14px 12px;
  background: var(--bg-surface);
  border: 2px solid var(--border);
  border-radius: var(--radius);
  cursor: pointer;
  transition: all 0.18s;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}
.role-btn .role-icon { font-size: 1.6rem; }
.role-btn .role-name {
  font-family: var(--font-display);
  font-size: 0.9rem;
  font-weight: 700;
  color: var(--text-secondary);
  letter-spacing: 0.3px;
}
.role-btn:hover { border-color: rgba(245,158,11,0.5); }
.role-btn.active {
  border-color: var(--amber);
  background: var(--amber-glow);
}
.role-btn.active .role-name { color: var(--amber); }

/* Form */
.login-form { display: flex; flex-direction: column; gap: 16px; }

.input-group {
  position: relative;
}
.input-group .input-icon {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-muted);
  font-size: 0.95rem;
  pointer-events: none;
}
.input-group .input {
  padding-left: 42px;
}

.login-btn {
  width: 100%;
  padding: 15px;
  font-family: var(--font-display);
  font-size: 1.05rem;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-top: 6px;
}

/* Version info */
.login-footer {
  margin-top: 28px;
  text-align: center;
  font-family: var(--font-mono);
  font-size: 0.75rem;
  color: var(--text-faint);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
}
.login-footer .dot {
  width: 3px;
  height: 3px;
  background: var(--text-faint);
  border-radius: 50%;
}

/* Animations */
@keyframes float1 {
  0%, 100% { transform: translate(0, 0); }
  50% { transform: translate(30px, 20px); }
}
@keyframes float2 {
  0%, 100% { transform: translate(0, 0); }
  50% { transform: translate(-20px, -30px); }
}
@keyframes loginAppear {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

  </style>

  };

    try { localStorage.setItem(PREFIX + key, JSON.stringify(value)); return true; }

      { id: 802, catId: 8, name: 'Soda 33cl',         price: 200,  icon: '🥤', active: true, stock: true },
      { id: 803, catId: 8, name: 'Jus d\'Orange',     price: 300,  icon: '🍊', active: true, stock: true },
      { id: 804, catId: 8, name: 'Café Express',      price: 150,  icon: '☕', active: true, stock: true },
      { id: 805, catId: 8, name: 'Thé à la Menthe',   price: 120,  icon: '🍵', active: true, stock: true },
      // Extras
      { id: 901, catId: 9, name: 'Pain',              price: 50,   icon: '🍞', active: true, stock: true },
      { id: 902, catId: 9, name: 'Frites',            price: 250,  icon: '🍟', active: true, stock: true },
      { id: 903, catId: 9, name: 'Salade de Riz',     price: 150,  icon: '🍚', active: true, stock: true },
    ]);

    // Tables
    const tables = [];
    for (let i = 1; i <= 20; i++) {
      tables.push({ id: i, label: `Table ${i}`, capacity: i % 4 === 0 ? 6 : 4, status: 'free', currentOrderId: null });
    }
    set('tables', tables);

    // Users / Staff
    set('users', [
      { id: 1, name: 'Admin',       username: 'admin',   password: '1234', role: 'manager', active: true },
      { id: 2, name: 'Caissier 1',  username: 'caisse1', password: '1111', role: 'cashier', active: true },
      { id: 3, name: 'Caissier 2',  username: 'caisse2', password: '2222', role: 'cashier', active: true },
      { id: 4, name: 'Serveur A',   username: 'serv1',   password: '3333', role: 'waiter',  active: true },
    ]);

    // Orders (empty initially)
    set('orders', []);
    set('order_counter', 1000);

    // Settings
    set('settings', {
      restaurantName: "R.Lynx™ RestFast",
      currency: 'DZD',
      tva: 9,
      ticketFooter: 'Merci de votre visite!',
      printerEnabled: false,
      soundEnabled: true,
      gestureMode: true,
      tableCount: 20,
    });
  };

  // ——— CRUD helpers ——— //
  const getAll = (table) => get(table, []);

  const getById = (table, id) => getAll(table).find(r => r.id === id) || null;

  const insert = (table, record) => {
    const rows = getAll(table);
    const id = record.id || (Date.now());
    const newRecord = { ...record, id };
    rows.push(newRecord);
    set(table, rows);
    return newRecord;
  };

  const update = (table, id, updates) => {
    const rows = getAll(table);
    const idx = rows.findIndex(r => r.id === id);
    if (idx === -1) return null;
    rows[idx] = { ...rows[idx], ...updates };
    set(table, rows);
    return rows[idx];
  };

  const del = (table, id) => {
    const rows = getAll(table).filter(r => r.id !== id);
    set(table, rows);
    return true;
  };

  // ——— Order-specific helpers ——— //
  const nextOrderNumber = () => {
    const n = get('order_counter', 1000) + 1;
    set('order_counter', n);
    return n;
  };

  const createOrder = (tableId, cashierId) => {
    const num = nextOrderNumber();
    const order = {
      id: Date.now(),
      number: num,
      tableId,
      cashierId,
      items: [],
      status: 'open',          // open | paid | cancelled
      paymentMethod: null,
      subtotal: 0,
      tva: 0,
      total: 0,
      createdAt: new Date().toISOString(),
      closedAt: null,
      note: '',
    };
    return insert('orders', order);
  };

  const addItemToOrder = (orderId, item, qty = 1) => {
    const order = getById('orders', orderId);
    if (!order) return null;
    const existingIdx = order.items.findIndex(i => i.itemId === item.id);
    if (existingIdx > -1) {
      order.items[existingIdx].qty += qty;
      order.items[existingIdx].lineTotal = order.items[existingIdx].qty * item.price;
    } else {
      order.items.push({
        itemId: item.id,
        name: item.name,
        icon: item.icon,
        price: item.price,
        qty,
        lineTotal: item.price * qty,
        note: '',
      });
    }
    _recalcOrder(order);
    return update('orders', orderId, order);
  };

  const removeItemFromOrder = (orderId, itemId) => {
    const order = getById('orders', orderId);
    if (!order) return null;
    order.items = order.items.filter(i => i.itemId !== itemId);
    _recalcOrder(order);
    return update('orders', orderId, order);
  };

  const updateItemQty = (orderId, itemId, qty) => {
    if (qty <= 0) return removeItemFromOrder(orderId, itemId);
    const order = getById('orders', orderId);
    if (!order) return null;
    const item = order.items.find(i => i.itemId === itemId);
    if (!item) return null;
    item.qty = qty;
    item.lineTotal = qty * item.price;
    _recalcOrder(order);
    return update('orders', orderId, order);
  };

  const closeOrder = (orderId, paymentMethod) => {
    const settings = get('settings', {});
    const tvaRate = (settings.tva || 9) / 100;
    const order = getById('orders', orderId);
    if (!order) return null;
    const subtotal = order.items.reduce((s, i) => s + i.lineTotal, 0);
    const tva = Math.round(subtotal * tvaRate);
    return update('orders', orderId, {
      status: 'paid',
      paymentMethod,
      subtotal,
      tva,
      total: subtotal + tva,
      closedAt: new Date().toISOString(),
    });
  };

  const _recalcOrder = (order) => {
    const settings = get('settings', {});
    const tvaRate = (settings.tva || 9) / 100;
    order.subtotal = order.items.reduce((s, i) => s + i.lineTotal, 0);
    order.tva = Math.round(order.subtotal * tvaRate);
    order.total = order.subtotal + order.tva;
  };

  // ——— Report queries ——— //
  const getTodayOrders = () => {
    const today = new Date().toDateString();
    return getAll('orders').filter(o =>
      o.status === 'paid' && new Date(o.closedAt).toDateString() === today
    );
  };

  const getOrdersByDate = (from, to) => {
    const f = new Date(from).getTime();
    const t = new Date(to).getTime() + 86400000;
    return getAll('orders').filter(o =>
      o.status === 'paid' &&
      new Date(o.closedAt).getTime() >= f &&
      new Date(o.closedAt).getTime() <= t
    );
  };

  const getDailySalesSummary = () => {
    const orders = getTodayOrders();
    return {
      count: orders.length,
      revenue: orders.reduce((s, o) => s + o.total, 0),
      avgTicket: orders.length ? Math.round(orders.reduce((s,o)=>s+o.total,0)/orders.length) : 0,
    };
  };

  return {
    init, get, set, remove, getAll, getById, insert, update, del,
    createOrder, addItemToOrder, removeItemFromOrder, updateItemQty,
    closeOrder, nextOrderNumber,
    getTodayOrders, getOrdersByDate, getDailySalesSummary,
  };
})();

// ——— Auth ——————————————————————————————————————————————————— //
const Auth = (() => {
  const SESSION_KEY = 'rlpos_session';

  const login = (username, password) => {
    const users = DB.getAll('users');
    const user = users.find(u => u.username === username && u.password === password && u.active);
    if (!user) return null;
    const session = { userId: user.id, name: user.name, role: user.role, loginAt: Date.now() };
    sessionStorage.setItem(SESSION_KEY, JSON.stringify(session));
    return session;
  };

  const logout = () => {
    sessionStorage.removeItem(SESSION_KEY);
    window.location.href = 'index.html';
  };

  const getSession = () => {
    try {
      const s = sessionStorage.getItem(SESSION_KEY);
      return s ? JSON.parse(s) : null;
    } catch { return null; }
  };

  const requireRole = (role) => {
    const session = getSession();
    if (!session) { window.location.href = 'index.html'; return null; }
    if (role && session.role !== role && session.role !== 'manager') {
      Toast.show('Accès refusé', 'error');
      setTimeout(() => window.location.href = 'index.html', 1000);
      return null;
    }
    return session;
  };

  return { login, logout, getSession, requireRole };
})();

// ——— Toast Notifications ———————————————————————————————————— //
const Toast = (() => {
  const init = () => {
    if (!document.getElementById('toast-container')) {
      const c = document.createElement('div');
      c.id = 'toast-container';
      document.body.appendChild(c);
    }
  };

  const show = (message, type = 'info', duration = 3000) => {
    init();
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    const icons = { success: '✓', error: '✗', info: '◆' };
    toast.innerHTML = `<span style="font-size:1rem">${icons[type]||'•'}</span><span>${message}</span>`;
    container.appendChild(toast);
    setTimeout(() => {
      toast.classList.add('fadeout');
      setTimeout(() => toast.remove(), 320);
    }, duration);
  };

  return { show };
})();

// ——— Modal Manager ——————————————————————————————————————————— //
const Modal = (() => {
  let stack = [];

  const open = (content, options = {}) => {
    const backdrop = document.createElement('div');
    backdrop.className = 'modal-backdrop';
    backdrop.id = `modal-${Date.now()}`;

    const modal = document.createElement('div');
    modal.className = 'modal';
    if (options.width) modal.style.width = options.width;
    modal.innerHTML = content;

    backdrop.appendChild(modal);
    document.body.appendChild(backdrop);

    // Close on backdrop click if not persistent
    if (!options.persistent) {
      backdrop.addEventListener('click', (e) => {
        if (e.target === backdrop) close(backdrop.id);
      });
    }

    // Close on Escape
    const onKey = (e) => { if (e.key === 'Escape' && !options.persistent) close(backdrop.id); };
    document.addEventListener('keydown', onKey);

    stack.push({ id: backdrop.id, el: backdrop, onKey });

    if (options.onOpen) options.onOpen(modal);

    return backdrop.id;
  };

  const close = (id) => {
    const idx = id ? stack.findIndex(m => m.id === id) : stack.length - 1;
    if (idx === -1) return;
    const entry = stack[idx];
    document.removeEventListener('keydown', entry.onKey);
    entry.el.remove();
    stack.splice(idx, 1);
  };

  const closeAll = () => {
    [...stack].forEach(m => close(m.id));
  };

  return { open, close, closeAll };
})();

// ——— Format Helpers ————————————————————————————————————————— //
const Fmt = {
  currency: (amount) => {
    const settings = DB.get('settings', {});
    const cur = settings.currency || 'DZD';
    return `${amount.toLocaleString('fr-DZ')} ${cur}`;
  },
  date: (iso) => new Date(iso).toLocaleDateString('fr-DZ', { day:'2-digit', month:'2-digit', year:'numeric' }),
  time: (iso) => new Date(iso).toLocaleTimeString('fr-DZ', { hour:'2-digit', minute:'2-digit' }),
  datetime: (iso) => `${Fmt.date(iso)} ${Fmt.time(iso)}`,
  percent: (val) => `${val.toFixed(1)}%`,
};

// ——— Sound Engine ———————————————————————————————————————————— //
const Sound = (() => {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();

  const play = (type) => {
    const settings = DB.get('settings', {});
    if (!settings.soundEnabled) return;
    try {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.connect(g);
      g.connect(ctx.destination);

      const presets = {
        add:     { freq: 880, duration: 0.08, wave: 'sine',     vol: 0.15 },
        remove:  { freq: 440, duration: 0.1,  wave: 'sawtooth', vol: 0.1  },
        pay:     { freq: 1046,duration: 0.4,  wave: 'sine',     vol: 0.2  },
        error:   { freq: 220, duration: 0.2,  wave: 'square',   vol: 0.1  },
        success: { freq: 660, duration: 0.3,  wave: 'sine',     vol: 0.15 },
      };

      const p = presets[type] || presets.add;
      o.frequency.value = p.freq;
      o.type = p.wave;
      g.gain.setValueAtTime(p.vol, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + p.duration);
      o.start(ctx.currentTime);
      o.stop(ctx.currentTime + p.duration);
    } catch {}
  };

  return { play };
})();

// ——— Clock ——————————————————————————————————————————————————— //
const Clock = {
  start: (el) => {
    const tick = () => {
      if (!el) return;
      const now = new Date();
      el.textContent = now.toLocaleTimeString('fr-DZ', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    };
    tick();
    setInterval(tick, 1000);
  }
};

// ——— Confirm Dialog ————————————————————————————————————————— //
const Confirm = (message, title = 'Confirmation') => {
  return new Promise((resolve) => {
    const id = Modal.open(`
      <div class="modal-title"><span class="icon">⚠</span> ${title}</div>
      <p style="color:var(--text-secondary);margin-bottom:24px;line-height:1.5">${message}</p>
      <div style="display:flex;gap:12px;justify-content:flex-end">
        <button class="btn btn-ghost" id="confirm-no">Annuler</button>
        <button class="btn btn-danger" id="confirm-yes">Confirmer</button>
      </div>
    `);
    document.getElementById('confirm-yes').onclick = () => { Modal.close(id); resolve(true); };
    document.getElementById('confirm-no').onclick  = () => { Modal.close(id); resolve(false); };
  });
};
